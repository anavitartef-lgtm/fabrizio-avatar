<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avatar de Fabrizio · Peruvian Health</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      background: #F5F0E8;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
 
    /* HEADER */
    .header {
      width: 100%;
      background: #1C2B1A;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .avatar-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7AB648, #4A8A2C);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(122,182,72,0.25);
    }
    .header-text .name { color: #E8F0D8; font-size: 17px; font-weight: bold; }
    .header-text .sub { color: #8AAF72; font-size: 12px; font-style: italic; margin-top: 2px; }
    .online-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #7AB648;
      box-shadow: 0 0 6px #7AB648;
    }
 
    /* CHAT */
    .chat-area {
      flex: 1;
      width: 100%;
      max-width: 680px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
 
    /* EMPTY STATE */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 14px; margin-top: 60px;
    }
    .empty-state .big-icon { font-size: 48px; }
    .empty-state h2 { color: #3D5A2C; font-size: 18px; }
    .empty-state p { color: #6B8050; font-size: 14px; max-width: 320px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion-btn {
      background: white; border: 1px solid #C8D8B0;
      border-radius: 20px; padding: 8px 14px;
      font-size: 12px; color: #3D5A2C;
      cursor: pointer; font-family: Georgia, serif;
      line-height: 1.4; max-width: 220px; text-align: left;
      transition: background 0.15s;
    }
    .suggestion-btn:hover { background: #EEF5E4; }
 
    /* MESSAGES */
    .message-row {
      display: flex; align-items: flex-end; gap: 8px;
    }
    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #7AB648, #4A8A2C);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .bubble {
      max-width: 75%;
      border-radius: 18px;
      padding: 12px 16px;
      font-size: 14px; line-height: 1.65;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      white-space: pre-wrap;
    }
    .bubble.user {
      background: #1C2B1A; color: #E8F0D8;
      border-radius: 18px 18px 4px 18px;
    }
    .bubble.assistant {
      background: white; color: #2A3D1C;
      border-radius: 18px 18px 18px 4px;
    }
 
    /* TYPING */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #7AB648;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
 
    /* INPUT */
    .input-area {
      width: 100%; max-width: 680px;
      padding: 12px 20px 24px;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-wrap {
      flex: 1; background: white;
      border: 1.5px solid #C8D8B0;
      border-radius: 24px;
      display: flex; align-items: flex-end;
      padding: 10px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: #7AB648; }
    textarea {
      flex: 1; border: none; outline: none; resize: none;
      font-size: 14px; font-family: Georgia, serif;
      color: #2A3D1C; background: transparent;
      line-height: 1.5; max-height: 120px; overflow-y: auto;
    }
    textarea::placeholder { color: #A0B890; }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      background: #C8D8B0; color: white;
    }
    .send-btn.active { background: #1C2B1A; }
    .send-btn.active:hover { transform: scale(1.05); }
  </style>
</head>
<body>
 
<div class="header">
  <div class="avatar-icon">🌿</div>
  <div class="header-text">
    <div class="name">Avatar de Fabrizio</div>
    <div class="sub">Peruvian Health · CEO & Co-fundador</div>
  </div>
  <div class="online-dot"></div>
</div>
 
<div class="chat-area" id="chat">
  <div class="empty-state" id="emptyState">
    <div class="big-icon">🌿</div>
    <h2>Hola, soy el avatar de Fabrizio</h2>
    <p>Puedo ayudarte con estrategia de marketing, clientes difíciles, innovación de producto y decisiones del día a día en Peruvian Health.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="useSuggestion(this)">¿Cómo respondería Fabrizio a una queja de cliente?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">¿Qué innovación propondría para el canal B2B?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">¿Cuál es la prioridad de marketing este trimestre?</button>
    </div>
  </div>
</div>
 
<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="Escríbele a Fabrizio..." onkeydown="handleKey(event)" oninput="adjustHeight(this); updateBtn()"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>
 
<div id="bottomAnchor"></div>
 
<script>
const SYSTEM_PROMPT = `Eres Fabrizio Anavitarte, CEO y co-fundador de Peruvian Health (razón social: Peruvian's Cook SAC), una empresa peruana de productos naturales con ~10 años de operación. Generas alrededor de 400–500k soles/mes con ~50 clientes B2B activos.
 
IMPORTANTE: Eres un avatar de Fabrizio. Si alguien pregunta quién eres, di algo como: "Soy el avatar de Fabrizio — una versión de IA entrenada con su forma de pensar y liderar Peruvian Health. No soy él en persona, pero puedo ayudarte a tomar decisiones como él lo haría."
 
---
 
EQUIPO ACTUAL:
- Rodrigo Anavitarte: Co-director, Operaciones y Administración
- Lesly Garcia: Marketing & Ventas Manager
- Jackeline Maiguare: Producción
- Mónica: Cobranzas y Despacho
- Luis Durand: Transporte B2B
- Marjorie: Contenido
- Karen: Ejecutiva de ventas B2B
- Sofía y Xiomara: Atención al cliente
- Miguel Ángel: Ventas B2B
 
---
 
FILOSOFÍA Y VALORES DE MARCA:
- Peruvian Health es un aliado silencioso del bienestar — no activista, no dominante. Filosofía Taoísta/Zen.
- Valores: honestidad, integridad, calidad holística, responsabilidad ambiental.
- Filosofía de ventas: "informas o transformas."
- Filosofía de equipo: el ego y la victimización son los principales obstáculos; el error es oportunidad.
- Slow productivity: hacer menos pero mejor.
 
---
 
CONTEXTO COMERCIAL:
- Aceite de coco = ~80% de los ingresos.
- Estrategia 2026: gomitas (apple cider vinegar, creatina, melatonina) en supermercados.
- InkaFarma es ~30% de las ventas. El cierre del deal de gomitas con InkaFarma es la prioridad #1 de los próximos 90 días.
- Prioridades 2026: tiempos de entrega de 3 días hábiles, lanzamiento de gomitas en supermercados, programa de afiliados TikTok.
 
---
 
CÓMO RESPONDER:
- Habla como Fabrizio: directo, cálido, sin lenguaje corporativo.
- Cuando la pregunta es filosófica o de manejo de personas, responde con profundidad humana.
- Cuando la pregunta es operativa, sé práctico y concreto.
- Usa español por defecto. Si alguien escribe en inglés, responde en inglés.
- Respuestas concisas pero completas. Sin paja.
 
---
 
CUÁNDO ESCALAR A FABRIZIO:
1. Decisiones con montos muy grandes o inversiones no presupuestadas
2. Contrataciones o desvinculaciones de personal
3. Nuevos productos o líneas de negocio
4. Alianzas estratégicas importantes
5. Temas legales o contractuales
 
PROTOCOLO: Si la situación es de alto nivel, pregunta: "¿Y qué vas a hacer exactamente?" Si la respuesta es vaga, di: "Para esta decisión, te recomiendo consultarlo directamente con Fabrizio."`;
 
let messages = [];
 
function useSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  updateBtn();
  sendMessage();
}
 
function adjustHeight(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
 
function updateBtn() {
  const val = document.getElementById('userInput').value.trim();
  const btn = document.getElementById('sendBtn');
  btn.classList.toggle('active', val.length > 0);
}
 
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
 
function scrollToBottom() {
  document.getElementById('bottomAnchor').scrollIntoView({ behavior: 'smooth' });
}
 
function addMessage(role, content) {
  const chat = document.getElementById('chat');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
 
  const row = document.createElement('div');
  row.className = `message-row ${role}`;
 
  if (role === 'assistant') {
    const icon = document.createElement('div');
    icon.className = 'msg-avatar';
    icon.textContent = '🌿';
    row.appendChild(icon);
  }
 
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = content;
  row.appendChild(bubble);
 
  chat.appendChild(row);
  scrollToBottom();
  return bubble;
}
 
function showTyping() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'message-row assistant';
  row.id = 'typingRow';
 
  const icon = document.createElement('div');
  icon.className = 'msg-avatar';
  icon.textContent = '🌿';
 
  const bubble = document.createElement('div');
  bubble.className = 'bubble assistant';
  bubble.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
 
  row.appendChild(icon);
  row.appendChild(bubble);
  chat.appendChild(row);
  scrollToBottom();
}
 
function removeTyping() {
  const row = document.getElementById('typingRow');
  if (row) row.remove();
}
 
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
 
  input.value = '';
  input.style.height = 'auto';
  updateBtn();
 
  messages.push({ role: 'user', content: text });
  addMessage('user', text);
  showTyping();
 
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages,
      })
    });
 
    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'No pude generar una respuesta.';
    messages.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('assistant', reply);
  } catch {
    removeTyping();
    addMessage('assistant', 'Hubo un error al conectar. Intenta de nuevo.');
  }
}
</script>
</body>
</html>
